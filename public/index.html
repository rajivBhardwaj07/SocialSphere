<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connectly — Sign in</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">C</div>
      <h1>Connectly</h1>
      <p class="tagline">Share moments. Build community.</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <form id="login-form" class="auth-form active">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit" class="btn-primary">Sign In</button>
      <p class="form-error" id="login-error"></p>
    </form>

    <form id="register-form" class="auth-form">
      <input type="text" name="username" placeholder="Username" minlength="3" maxlength="30" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password (min 6 chars)" minlength="6" required />
      <button type="submit" class="btn-primary">Create Account</button>
      <p class="form-error" id="register-error"></p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
